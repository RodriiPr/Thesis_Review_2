services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: thesis_review
      POSTGRES_USER: thesis
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-supersecret123}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U thesis -d thesis_review"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:-minioadmin123}
      MINIO_SERVER_NAME: localhost
    volumes:
      - miniodata:/data
    ports:
      - "9000:9000"
      - "9001:9001"

  seed:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    environment:
      DATABASE_URL: postgresql://thesis:${POSTGRES_PASSWORD:-supersecret123}@postgres:5432/thesis_review
    depends_on:
      postgres:
        condition: service_healthy
    command: >
      sh -c "cd /app && pnpm db:push --accept-data-loss && pnpm db:seed"

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    environment:
      DATABASE_URL: postgresql://thesis:${POSTGRES_PASSWORD:-supersecret123}@postgres:5432/thesis_review
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      MINIO_ENDPOINT: minio
      MINIO_PORT: "9000"
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY:-minioadmin123}
      MINIO_BUCKET: ${MINIO_BUCKET:-thesis-documents}
      MINIO_USE_SSL: ${MINIO_USE_SSL:-false}
      MINIO_PUBLIC_ENDPOINT: ${MINIO_PUBLIC_ENDPOINT:-localhost}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY:-}
      DEEPSEEK_MODEL: ${DEEPSEEK_MODEL:-deepseek-v4-flash}
      OLLAMA_MODEL: ${OLLAMA_MODEL:-}
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-http://host.docker.internal:11434}
      JWT_SECRET: ${JWT_SECRET:-change-me}
      MAX_GRADE: "20"
      PORT: "3001"
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:3001}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    ports:
      - "3001:3001"

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      target: builder
    environment:

      NEXT_PUBLIC_API_URL: http://localhost:3001
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET:-change-me}
      NEXTAUTH_URL: http://localhost:3000
    ports:
      - "3000:3000"
    volumes:
      - .:/app
      - /app/node_modules
      - /app/apps/web/node_modules
      - /app/packages:/app/packages
    command: sh -c "pnpm install --filter @thesis-review/web && pnpm --filter @thesis-review/web dev"
    depends_on:


      - api

volumes:
  pgdata:
  redisdata:
  miniodata:
